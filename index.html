<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Jogo da memória clássico feito com JavaScript." />
  <title>🧠 Jogo da Memória</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <h1 class="title">🧠 Jogo da Memória</h1>

    <div class="bar">
      <div class="chip"><span class="chip__ico">🎯</span> Jogadas: <b id="moves">0</b></div>
      <div class="chip"><span class="chip__ico">⏱️</span> Tempo: <b id="time">0s</b></div>
      <div class="chip"><span class="chip__ico">✅</span> Pares: <b id="pairs">0/8</b></div>
    </div>

    <div class="board" id="board"></div>

    <div class="actions">
      <button class="btn" id="restart">↻ Reiniciar</button>
    </div>
  </main>

  <!-- Tela de vitória -->
  <div class="win hidden" id="win">
    <div class="win__card">
      <div class="win__emoji">🏆</div>
      <h2>Você venceu!</h2>
      <p>Completou em <b id="winMoves">0</b> jogadas e <b id="winTime">0s</b>.</p>
      <button class="btn btn--primary" id="playAgain">Jogar de novo</button>
    </div>
  </div>

  <footer class="credit">por <a href="https://github.com/Samuelf27" target="_blank" rel="noopener">Samuel Ferreira</a></footer>
  <script src="script.js"></script>
</body>
</html>
